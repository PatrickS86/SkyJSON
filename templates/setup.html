{% extends 'base.html' %}
{% block content %}
<div class="card narrow">
    <h1>Welcome to SkyJSON</h1>
    <p class="muted">Complete the web installer to configure the application. This only needs to be done once.</p>

    <form method="post" class="form-grid">
        <label>Aircraft data source
            <select name="source_type">
                <option value="file">Local file</option>
                <option value="url">Remote URL</option>
            </select>
        </label>

        <label>Local path to aircraft.json
            <input type="text" name="aircraft_path" placeholder="/run/readsb/aircraft.json">
        </label>

        <label>Remote URL to aircraft.json
            <input type="url" name="aircraft_url" placeholder="http://192.168.1.50/aircraft.json">
        </label>

        <label>Local path to receiver.json
            <input type="text" name="receiver_path" placeholder="/run/readsb/receiver.json">
        </label>

        <label>Remote URL to receiver.json
            <input type="url" name="receiver_url" placeholder="http://192.168.1.50/receiver.json">
        </label>

        <label class="checkbox-row">
            <input type="checkbox" name="enable_auth">
            Protect configuration panel
        </label>

        <div class="two-col">
            <label>Configuration username
                <input type="text" name="username" placeholder="Only required when protection is enabled">
            </label>

            <label>Configuration password
                <input type="password" name="password" placeholder="Only required when protection is enabled">
            </label>
        </div>

        <button type="submit" class="btn btn-primary">Finish setup</button>
    </form>
</div>
{% endblock %}
