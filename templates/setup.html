{% extends 'base.html' %}
{% block content %}
<div class="card narrow">
    <h1>Welcome to SkyJSON</h1>
    <p class="muted">Complete the web installer to configure the application. This only needs to be done once.</p>
    <form method="post" class="form-grid">
        <label>Application title
            <input type="text" name="app_title" value="SkyJSON" required>
        </label>
        <label>Aircraft data source
            <select name="source_type">
                <option value="file">Local file</option>
                <option value="url">Remote URL</option>
            </select>
        </label>
        <label>Local path to aircraft.json
            <input type="text" name="aircraft_path" placeholder="/run/readsb/aircraft.json">
        </label>
        <label>Remote URL to aircraft.json
            <input type="url" name="aircraft_url" placeholder="http://192.168.1.50/aircraft.json">
        </label>
        <div class="two-col">
            <label>Rows shown on dashboard
                <input type="number" name="rows_per_page" value="100" min="10" max="5000">
            </label>
            <label>Refresh interval (seconds)
                <input type="number" name="refresh_interval" value="15" min="5" max="300">
            </label>
        </div>
        <label class="checkbox-row"><input type="checkbox" name="enable_auth"> Protect the configuration panel with a username and password</label>
        <div class="two-col">
            <label>Configuration username
                <input type="text" name="username" placeholder="admin">
            </label>
            <label>Configuration password
                <input type="password" name="password" placeholder="••••••••">
            </label>
        </div>
        <button type="submit" class="btn btn-primary">Finish installation</button>
    </form>
</div>
{% endblock %}
