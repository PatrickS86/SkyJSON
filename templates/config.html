<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkyJSON Config</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #3b82f6;
}

body.light {
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --accent: #2563eb;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.container {
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
}

.card {
    background: var(--card);
    padding: 20px;
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 16px;
    border-radius: 6px;
    border: none;
    background: #0f172a;
    color: white;
}

body.light input, body.light select {
    background: #e2e8f0;
    color: #000;
}

button {
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: white;
    cursor: pointer;
}

.topbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 20px;
}

.theme-toggle {
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 6px;
    background: var(--card);
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
<div class="theme-toggle" onclick="toggleTheme()">🌙 / ☀️</div>
</div>

<div class="card">
<h2>Configuration</h2>

<form>
<label>Source type</label>
<select>
<option>Local</option>
<option>Remote</option>
</select>

<label>Local path</label>
<input type="text">

<label>Remote URL</label>
<input type="text">

<label>Config protection</label>
<select>
<option>Disabled</option>
<option>Enabled</option>
</select>

<label>Username</label>
<input type="text">

<label>Password</label>
<input type="password">

<button type="submit">Save</button>
</form>
</div>

</div>

<script>
function applyTheme() {
    const theme = localStorage.getItem("theme");
    if (theme === "light") {
        document.body.classList.add("light");
    }
}

function toggleTheme() {
    const isLight = document.body.classList.toggle("light");
    localStorage.setItem("theme", isLight ? "light" : "dark");
}

applyTheme();
</script>

</body>
</html>
