<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkyJSON Dashboard</title>

<style>
:root {
    --bg: #0f172a;
    --text: #e2e8f0;
}

body.light {
    --bg: #f1f5f9;
    --text: #0f172a;
}

body {
    background: var(--bg);
    color: var(--text);
    margin: 0;
    font-family: Arial;
}
</style>
</head>

<body>

<div style="position:absolute;top:10px;right:10px;cursor:pointer;" onclick="toggleTheme()">
🌙 / ☀️
</div>

<h2 style="padding:20px;">Dashboard</h2>

<script>
function applyTheme() {
    const theme = localStorage.getItem("theme");
    if (theme === "light") {
        document.body.classList.add("light");
    }
}

function toggleTheme() {
    const isLight = document.body.classList.toggle("light");
    localStorage.setItem("theme", isLight ? "light" : "dark");
}

applyTheme();
</script>

</body>
</html>
