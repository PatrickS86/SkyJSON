{% extends 'base.html' %}
{% block content %}
<div id="map" style="height:500px;"></div>

<script>
const polarPoints = JSON.parse(localStorage.getItem('polar')||'[]');
function savePolar(lat,lon){
    polarPoints.push([lat,lon]);
    localStorage.setItem('polar', JSON.stringify(polarPoints));
}
</script>
{% endblock %}
